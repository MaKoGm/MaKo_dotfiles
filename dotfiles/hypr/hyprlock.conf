# --- FONDO (Captura de pantalla difuminada en tiempo real) ---
background {
    monitor =
    path = screenshot
    
    # Ajustes del difuminado
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7000 # Un poco más oscuro para que resalte el texto
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- RELOJ (Hora en grande) ---
label {
    monitor =
    # $TIME muestra la hora en formato HH:MM
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 80
    font_family = sans-serif # Puedes cambiarlo por la fuente que uses en tu sistema
    
    position = 0, 150 # Posicionado arriba del centro
    halign = center
    valign = center
}

# --- CAJA DE CONTRASEÑA (Bordes muy redondos, escala de grises) ---
input-field {
    monitor =
    size = 320, 50 # Ancho y alto de la caja
    outline_thickness = 3 # Grosor del borde
    
    # Configuración de los puntos de la contraseña
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    
    # Paleta de colores (Gris y Negro)
    outer_color = rgb(150, 150, 150) # Borde exterior gris medio
    inner_color = rgb(20, 20, 20)    # Fondo de la caja casi negro
    font_color = rgb(255, 255, 255)  # Puntos blancos al escribir
    
    fade_on_empty = false
    placeholder_text = <span></span>
    hide_input = false
    
    # Magia de los bordes: Poner la mitad de la altura (60/2) lo hace totalmente redondo
    rounding = 30
    
    position = 0, -50 # Posicionado debajo del reloj
    halign = center
    valign = center
}

# More option see https://github.com/DreamMaoMao/mango/wiki/

# Importar configuraciones modulares
source=~/.config/mango/monitors_effects.conf
source=~/.config/mango/rules.conf
source=~/.config/mango/keybinds.conf

### -------------------------------

exec-once=quickshell -c noctalia-shell

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=es
xkb_rules_options=caps:escape_shifted_capslock

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=0
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF

# Axis Bindings  ## tengo que mirarlo##
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

